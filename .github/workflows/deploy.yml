name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (my-community)
        working-directory: lecture1/my-community
        run: npm install

      - name: Build my-community
        working-directory: lecture1/my-community
        run: npm run build

      - name: Install dependencies (my-guestbook)
        working-directory: lecture1/my-guestbook
        run: npm install

      - name: Build my-guestbook
        working-directory: lecture1/my-guestbook
        run: npm run build

      - name: Install dependencies (mini_sns)
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build mini_sns
        working-directory: lecture1/mini_sns
        run: npm run build

      - name: Prepare deployment
        run: |
          mkdir -p _site/my-community
          mkdir -p _site/my-guestbook
          mkdir -p _site/mini_sns
          cp index.html _site/
          cp -r lecture1/my-community/dist/. _site/my-community/
          cp -r lecture1/my-guestbook/dist/. _site/my-guestbook/
          cp -r lecture1/mini_sns/dist/. _site/mini_sns/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
